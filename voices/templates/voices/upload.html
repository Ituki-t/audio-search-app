{% extends 'base.html' %}

{% block title %}
ファイルアップロード
{% endblock %}

{% block content %}
    <div class="container">
        <h1 class="my-5">アップロードフォーム</h1>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">ファイルをアップロードする</button>
        </form>
    </div>
{% endblock content %}
